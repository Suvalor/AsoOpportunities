<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>种子进化</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#e1e4eb;font-family:system-ui,-apple-system,sans-serif;padding:20px;overflow-y:auto}
h1{font-size:20px;margin-bottom:16px}
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.stat-card{background:#1a1d27;border:1px solid #2d3148;border-radius:8px;padding:14px 18px;min-width:120px}
.stat-card .label{font-size:12px;color:#8b8fa3;margin-bottom:4px}
.stat-card .value{font-size:22px;font-weight:700}
.seed-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:20px}
.seed-card{background:#1a1d27;border:1px solid #2d3148;border-radius:8px;padding:14px;cursor:pointer;transition:border-color .15s}
.seed-card:hover{border-color:#4f8ef7}
.seed-card .seed-text{font-size:14px;font-weight:600;margin-bottom:6px;word-break:break-all}
.seed-card .seed-meta{font-size:12px;color:#8b8fa3}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;margin-left:6px}
.badge-active{background:rgba(63,185,80,.15);color:#3fb950}
.badge-pending{background:rgba(210,153,34,.15);color:#d29922}
.badge-pruned{background:rgba(229,83,83,.15);color:#e55353}
.evo-log{background:#1a1d27;border:1px solid #2d3148;border-radius:8px;padding:16px;max-height:300px;overflow-y:auto;font-size:13px;line-height:1.6}
.evo-log pre{white-space:pre-wrap;word-break:break-all}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:100}
.modal-overlay.show{display:flex}
.modal{background:#1a1d27;border:1px solid #2d3148;border-radius:12px;padding:24px;max-width:800px;width:90%;max-height:80vh;overflow-y:auto}
.modal h2{font-size:18px;margin-bottom:12px}
.modal .close-btn{float:right;background:none;border:none;color:#8b8fa3;font-size:20px;cursor:pointer}
.kw-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px}
.kw-table th,.kw-table td{padding:8px 10px;text-align:left;border-bottom:1px solid #2d3148}
.kw-table th{color:#8b8fa3;font-weight:600}
.score-gold{color:#f0c040;font-weight:700}
.score-blue{color:#4f8ef7;font-weight:700}
.score-watch{color:#d29922}
.score-skip{color:#8b8fa3}
.empty-state{text-align:center;padding:40px;color:#8b8fa3}
</style>
</head>
<body>
<h1>🌱 种子进化矩阵</h1>
<div class="stats" id="statsRow"></div>
<div class="seed-grid" id="seedGrid"></div>
<div id="evoSection">
  <h2 style="font-size:16px;margin-bottom:8px">进化日志</h2>
  <div class="evo-log" id="evoLog"><span style="color:#8b8fa3">加载中…</span></div>
</div>

<div class="modal-overlay" id="kwModal">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">&times;</button>
    <h2 id="modalTitle"></h2>
    <div id="modalBody"></div>
  </div>
</div>

<script>
(function(){
  'use strict';

  // 从父窗口读取登录状态
  let isLoggedIn = false;
  try {
    isLoggedIn = !!(window.parent && window.parent.__authUser);
  } catch(e) {}

  const statsRow = document.getElementById('statsRow');
  const seedGrid = document.getElementById('seedGrid');
  const evoLog = document.getElementById('evoLog');

  function badgeHTML(status) {
    const cls = {active:'badge-active',pending:'badge-pending',pruned:'badge-pruned'}[status] || 'badge-active';
    return '<span class="badge ' + cls + '">' + status + '</span>';
  }

  function scoreClass(score) {
    if (score >= 75) return 'score-gold';
    if (score >= 55) return 'score-blue';
    if (score >= 35) return 'score-watch';
    return 'score-skip';
  }

  async function loadStatus() {
    try {
      const resp = await fetch('/seeds/status');
      if (!resp.ok) throw new Error('status ' + resp.status);
      const data = await resp.json();

      const counts = data.seed_counts || {};
      const items = [
        {label:'Active', value: counts.active || 0},
        {label:'Pending', value: counts.pending || 0},
        {label:'Pruned', value: counts.pruned || 0},
        {label:'总种子数', value: counts.total || 0},
        {label:'当前世代', value: data.current_generation || '-'},
      ];
      statsRow.innerHTML = items.map(i =>
        '<div class="stat-card"><div class="label">' + i.label + '</div><div class="value">' + i.value + '</div></div>'
      ).join('');

      // 进化日志
      const logs = data.evolution_logs || [];
      if (logs.length === 0) {
        evoLog.innerHTML = '<span style="color:#8b8fa3">暂无进化记录</span>';
      } else {
        evoLog.innerHTML = logs.map(l => {
          const ts = l.created_at || '';
          const action = l.action || '';
          let detail = '';
          try { detail = JSON.stringify(JSON.parse(l.payload || '{}'), null, 2); } catch(e) { detail = l.payload || ''; }
          return '<div><b>' + ts + '</b> ' + action + '<pre>' + detail + '</pre></div>';
        }).join('<hr style="border-color:#2d3148;margin:8px 0">');
      }
    } catch(e) {
      statsRow.innerHTML = '<div class="stat-card"><div class="value" style="color:#e55353">加载失败</div></div>';
    }
  }

  async function loadSeeds() {
    try {
      const resp = await fetch('/seeds/list?limit=200');
      if (!resp.ok) throw new Error('status ' + resp.status);
      const data = await resp.json();
      const items = data.items || [];
      if (items.length === 0) {
        seedGrid.innerHTML = '<div class="empty-state">暂无种子数据</div>';
        return;
      }
      seedGrid.innerHTML = items.map(s =>
        '<div class="seed-card" data-seed="' + encodeURIComponent(s.seed) + '">' +
        '<div class="seed-text">' + escHTML(s.seed) + badgeHTML(s.status) + '</div>' +
        '<div class="seed-meta">世代 ' + (s.generation || '-') + ' · 来源 ' + (s.source || '-') + '</div>' +
        '</div>'
      ).join('');

      seedGrid.querySelectorAll('.seed-card').forEach(card => {
        card.addEventListener('click', () => showSeedKeywords(decodeURIComponent(card.dataset.seed)));
      });
    } catch(e) {
      seedGrid.innerHTML = '<div class="empty-state">加载种子列表失败</div>';
    }
  }

  async function showSeedKeywords(seed) {
    const modal = document.getElementById('kwModal');
    const title = document.getElementById('modalTitle');
    const body = document.getElementById('modalBody');
    title.textContent = '种子：' + seed;
    body.innerHTML = '<div style="color:#8b8fa3">加载中…</div>';
    modal.classList.add('show');

    try {
      const resp = await fetch('/seeds/' + encodeURIComponent(seed) + '/keywords?limit=100');
      if (!resp.ok) throw new Error('status ' + resp.status);
      const data = await resp.json();
      const kws = data.keywords || [];
      if (kws.length === 0) {
        body.innerHTML = '<div style="color:#8b8fa3">该种子暂无关联关键词</div>';
        return;
      }
      let html = '<table class="kw-table"><thead><tr>' +
        '<th>关键词</th><th>蓝海分</th><th>标签</th><th>国家</th><th>扫描时间</th>' +
        '</tr></thead><tbody>';
      kws.forEach(k => {
        const score = k.blue_ocean_score || 0;
        html += '<tr>' +
          '<td>' + escHTML(k.keyword || '') + '</td>' +
          '<td class="' + scoreClass(score) + '">' + score + '</td>' +
          '<td>' + escHTML(k.blue_ocean_label || '') + '</td>' +
          '<td>' + escHTML(k.country || '') + '</td>' +
          '<td>' + escHTML(k.scanned_at || '') + '</td>' +
          '</tr>';
      });
      html += '</tbody></table>';
      body.innerHTML = html;
    } catch(e) {
      body.innerHTML = '<div style="color:#e55353">加载关键词失败</div>';
    }
  }

  window.closeModal = function() {
    document.getElementById('kwModal').classList.remove('show');
  };

  function escHTML(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  loadStatus();
  loadSeeds();
})();
</script>
</body>
</html>
