<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>关键词洞察</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#e1e4eb;font-family:system-ui,-apple-system,sans-serif;padding:20px;overflow-y:auto}
h1{font-size:20px;margin-bottom:16px}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.toolbar select,.toolbar input{background:#1a1d27;border:1px solid #2d3148;color:#e1e4eb;padding:6px 10px;border-radius:6px;font-size:13px}
.toolbar input{width:200px}
.btn{padding:7px 16px;border-radius:6px;border:none;font-size:13px;cursor:pointer;transition:all .15s;font-family:inherit}
.btn-primary{background:#4f8ef7;color:#fff}
.btn-primary:hover{opacity:.85}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{background:#2d3148;color:#e1e4eb}
.btn-secondary:hover{background:#3d4168}
.btn-danger{background:#e55353;color:#fff}
.report-section{margin-bottom:24px}
.report-card{background:#1a1d27;border:1px solid #2d3148;border-radius:8px;padding:16px;margin-bottom:12px;cursor:pointer;transition:border-color .15s}
.report-card:hover{border-color:#4f8ef7}
.report-card .rc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.report-card .rc-title{font-size:15px;font-weight:600}
.report-card .rc-meta{font-size:12px;color:#8b8fa3}
.report-card .rc-preview{font-size:13px;color:#8b8fa3;max-height:60px;overflow:hidden}
.report-md{background:#1a1d27;border:1px solid #2d3148;border-radius:8px;padding:20px;line-height:1.7;font-size:14px;white-space:pre-wrap;word-break:break-word}
.report-md h1,.report-md h2,.report-md h3{margin-top:16px;margin-bottom:8px}
.kw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-top:12px}
.kw-card{background:#1a1d27;border:1px solid #2d3148;border-radius:6px;padding:10px 14px;font-size:13px}
.kw-card .kw-word{font-weight:600;margin-bottom:4px}
.kw-card .kw-score{font-weight:700}
.score-gold{color:#f0c040}.score-blue{color:#4f8ef7}.score-watch{color:#d29922}.score-skip{color:#8b8fa3}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:100}
.modal-overlay.show{display:flex}
.modal{background:#1a1d27;border:1px solid #2d3148;border-radius:12px;padding:24px;max-width:900px;width:90%;max-height:80vh;overflow-y:auto}
.modal h2{font-size:18px;margin-bottom:12px}
.modal .close-btn{float:right;background:none;border:none;color:#8b8fa3;font-size:20px;cursor:pointer}
.empty-state{text-align:center;padding:40px;color:#8b8fa3}
.auth-hint{font-size:12px;color:#8b8fa3;margin-left:8px}
</style>
</head>
<body>
<h1>📊 关键词洞察</h1>

<div class="toolbar">
  <select id="labelFilter">
    <option value="">全部标签</option>
    <option value="💎 金矿">💎 金矿</option>
    <option value="🟢 蓝海">🟢 蓝海</option>
    <option value="🟡 观察">🟡 观察</option>
    <option value="🔴 跳过">🔴 跳过</option>
  </select>
  <input id="searchInput" placeholder="搜索关键词…" />
  <button class="btn btn-primary" id="btnScan" style="display:none">全盘扫描</button>
  <button class="btn btn-secondary" id="btnGenerate" style="display:none">生成报告</button>
  <span class="auth-hint" id="authHint"></span>
</div>

<div class="report-section">
  <h2 style="font-size:16px;margin-bottom:8px">最新报告</h2>
  <div id="reportArea"><span style="color:#8b8fa3">加载中…</span></div>
</div>

<div>
  <h2 style="font-size:16px;margin-bottom:8px">高分关键词</h2>
  <div id="kwArea"><span style="color:#8b8fa3">加载中…</span></div>
</div>

<div class="modal-overlay" id="kwModal">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">&times;</button>
    <h2 id="modalTitle"></h2>
    <div id="modalBody"></div>
  </div>
</div>

<script>
(function(){
  'use strict';

  // 从父窗口读取登录状态
  let isLoggedIn = false;
  try {
    isLoggedIn = !!(window.parent && window.parent.__authUser);
  } catch(e) {}

  // 登录后才显示操作按钮
  const btnScan = document.getElementById('btnScan');
  const btnGenerate = document.getElementById('btnGenerate');
  const authHint = document.getElementById('authHint');

  if (isLoggedIn) {
    btnScan.style.display = 'inline-block';
    btnGenerate.style.display = 'inline-block';
  } else {
    authHint.textContent = '登录后可执行扫描和生成报告';
  }

  const reportArea = document.getElementById('reportArea');
  const kwArea = document.getElementById('kwArea');
  const labelFilter = document.getElementById('labelFilter');
  const searchInput = document.getElementById('searchInput');

  let allKeywords = [];
  let latestReport = null;

  function scoreClass(score) {
    if (score >= 75) return 'score-gold';
    if (score >= 55) return 'score-blue';
    if (score >= 35) return 'score-watch';
    return 'score-skip';
  }

  function escHTML(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // 加载最新报告
  async function loadReport() {
    try {
      const resp = await fetch('/report/latest');
      if (!resp.ok) throw new Error('status ' + resp.status);
      const data = await resp.json();
      if (!data.id) {
        reportArea.innerHTML = '<div class="empty-state">暂无报告</div>';
        return;
      }
      latestReport = data;
      const md = data.report_md || '';
      const preview = md.substring(0, 200).replace(/[#*_`]/g, '');
      reportArea.innerHTML =
        '<div class="report-card" onclick="showReport()">' +
        '<div class="rc-header"><span class="rc-title">报告 #' + data.id + '</span>' +
        '<span class="rc-meta">' + (data.created_at || '') + ' · ' + (data.triggered_by || '') + '</span></div>' +
        '<div class="rc-preview">' + escHTML(preview) + '</div></div>';
    } catch(e) {
      reportArea.innerHTML = '<div class="empty-state">加载报告失败</div>';
    }
  }

  window.showReport = function() {
    if (!latestReport) return;
    const modal = document.getElementById('kwModal');
    const title = document.getElementById('modalTitle');
    const body = document.getElementById('modalBody');
    title.textContent = '报告 #' + latestReport.id;
    body.innerHTML = '<div class="report-md">' + escHTML(latestReport.report_md || '') + '</div>';
    modal.classList.add('show');
  };

  // 加载高分关键词
  async function loadKeywords() {
    try {
      const resp = await fetch('/analysis/top?limit=100');
      if (!resp.ok) throw new Error('status ' + resp.status);
      const data = await resp.json();
      allKeywords = data.keywords || [];
      renderKeywords();
    } catch(e) {
      kwArea.innerHTML = '<div class="empty-state">加载关键词失败</div>';
    }
  }

  function renderKeywords() {
    const label = labelFilter.value;
    const search = searchInput.value.trim().toLowerCase();
    let filtered = allKeywords;
    if (label) filtered = filtered.filter(k => (k.blue_ocean_label || '').includes(label.replace(/[💎🟢🟡🔴]/g, '').trim()));
    if (search) filtered = filtered.filter(k => (k.keyword || '').toLowerCase().includes(search));

    if (filtered.length === 0) {
      kwArea.innerHTML = '<div class="empty-state">无匹配关键词</div>';
      return;
    }
    kwArea.innerHTML = '<div class="kw-grid">' + filtered.map(k => {
      const score = k.blue_ocean_score || 0;
      return '<div class="kw-card">' +
        '<div class="kw-word">' + escHTML(k.keyword) + '</div>' +
        '<span class="kw-score ' + scoreClass(score) + '">' + score + '</span> ' +
        '<span style="color:#8b8fa3;font-size:12px">' + escHTML(k.blue_ocean_label || '') + '</span>' +
        '</div>';
    }).join('') + '</div>';
  }

  labelFilter.addEventListener('change', renderKeywords);
  searchInput.addEventListener('input', renderKeywords);

  // 扫描按钮
  btnScan.addEventListener('click', async function() {
    if (!isLoggedIn) return;
    btnScan.disabled = true;
    btnScan.textContent = '扫描中…';
    try {
      const resp = await fetch('/scan/start', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({mode: 'full'})
      });
      if (!resp.ok) throw new Error('status ' + resp.status);
      const data = await resp.json();
      alert('扫描已启动，batch_id: ' + data.batch_id);
    } catch(e) {
      alert('启动扫描失败: ' + e.message);
    }
    btnScan.disabled = false;
    btnScan.textContent = '全盘扫描';
  });

  // 生成报告按钮
  btnGenerate.addEventListener('click', async function() {
    if (!isLoggedIn) return;
    btnGenerate.disabled = true;
    btnGenerate.textContent = '生成中…';
    try {
      const resp = await fetch('/report/generate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({force: true})
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.detail || 'status ' + resp.status);
      }
      alert('报告生成成功');
      loadReport();
    } catch(e) {
      alert('生成报告失败: ' + e.message);
    }
    btnGenerate.disabled = false;
    btnGenerate.textContent = '生成报告';
  });

  window.closeModal = function() {
    document.getElementById('kwModal').classList.remove('show');
  };

  loadReport();
  loadKeywords();
})();
</script>
</body>
</html>
