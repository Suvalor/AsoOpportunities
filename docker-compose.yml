services:
  aso-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aso-service
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - aso-data:/data
    # 使用宿主机或云上的外部 MySQL；Linux 上访问宿主机数据库需解析 host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  aso-data:
